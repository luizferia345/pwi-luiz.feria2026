<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Canolli Vianna</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== CABEÇALHO ===== -->
  <header>
    <div class="cabecalho-interno">
      <h1>Canolli Vianna</h1>
      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>

        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== FORMULÁRIO DE LOGIN CENTRALIZADO ===== -->
  <!-- pagina-login centraliza o card no meio da tela -->
  <section class="pagina-login">
    <div class="card card-login">

      <h4>🔒 Login</h4>

      <div class="formulario">
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button type="button" class="botao botao-escuro" onclick="login()">Entrar</button>
        <button type="button" class="botao botao-amarelo">Registrar</button>
      </div>

    </div>
  </section>

  <!-- ===== RODAPÉ ===== -->
  <footer>
    <div class="container">

      <div>
        <h5>Canolli Vianna</h5>
        <p>A melhor experiência italiana da cidade.</p>
      </div>

      <div>
        <h5>Links</h5>
        <p><a href="sobre.html">Sobre nós</a></p>
        <p><a href="cardapio.html">Cardápio</a></p>
        <p><a href="contato.html">Contato</a></p>
      </div>

      <div>
        <h5>Redes Sociais</h5>
        <div class="redes-sociais">
          <a href="#">TK</a>
          <a href="#">FB</a>
          <a href="#">IG</a>
          <a href="#">WA</a>
        </div>
      </div>

    </div>
