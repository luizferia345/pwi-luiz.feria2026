<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabrina Carpenter Fan Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f3f3;
            color: #333;
        }
        header {
            background-color: #ff6f61;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            max-width: 300px;
            margin: 10px;
            border-radius: 10px;
        }
        .videos iframe {
            width: 100%;
            max-width: 560px;
            height: 315px;
            margin: 10px 0;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #ff6f61;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Sabrina Carpenter Fan Page</h1>
        <p>A place to celebrate the amazing Sabrina Carpenter!</p>
    </header>
    <div class="content">
        <section class="gallery">
            <h2>Photo Gallery</h2>
            <img src="imagens sabrina/images 2.webp" alt="Sabrina Carpenter 1">
            <img src="imagens sabrina/images.webp" alt="Sabrina Carpenter 2">
            <img src="imagens sabrina/sabrina 3.jpg" alt="Sabrina Carpenter 3">
        </section>
        <section class="videos">
            <h2>Videos</h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/eVli-tstM5E?si=JPjPRlPE93xWF_Z7" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/cF1Na4AIecM?si=mtOVKr9fYqMbQQJQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>
    </div>
    <footer>
        <p>&copy; 2023 Sabrina Carpenter Fan Page. All rights reserved.</p>
    </footer>
</body>
</html>
